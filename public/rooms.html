<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Resorts & Premium Stays in Yercaud | Book&Sync</title>
    <meta name="description" content="Find the best deals on resorts, cottages, and hotel rooms in Yercaud. Book your perfect stay with verified reviews and instant confirmation on Book&Sync.">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Razorpay script removed -->
    <style>
        :root { --gold: #C9A84C; --gold-light: #F5E6C3; }

        .stays-hero {
            background: linear-gradient(160deg, #0a2e1a 0%, #1a4a2e 50%, #0d3321 100%);
            padding: 5rem 1rem 7rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .stays-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=60&w=1200') center/cover;
            opacity: 0.12;
        }
        .stays-hero .eyebrow {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.75rem;
            position: relative;
        }
        .stays-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: white;
            margin-bottom: 1rem;
            line-height: 1.2;
            position: relative;
        }
        .stays-hero p {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            position: relative;
        }

        /* Search Bar */
        .search-bar {
            background: white;
            border-radius: 24px;
            padding: 0.75rem 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            max-width: 850px;
            margin: 0 auto;
            position: relative;
            transform: translateY(50%);
            flex-wrap: wrap;
        }
        @media (max-width: 768px) {
            .search-bar { transform: none; margin-top: -2rem; padding: 1.5rem; }
        }
        .search-field {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #E2E8F0;
            padding-right: 1rem;
            text-align: left;
        }
        .search-field:last-of-type { border-right: none; }
        .search-field label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748B;
            margin-bottom: 4px;
        }
        .search-field select {
            border: none;
            outline: none;
            font-size: 1rem;
            font-weight: 600;
            color: #0F172A;
            background: transparent;
            width: 100%;
            cursor: pointer;
        }
        .search-btn {
            background: linear-gradient(135deg, #2D5A27, #4A8C42);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 1rem 2rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(45,90,39,0.4);
        }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(45,90,39,0.5); }

        /* Content Area */
        .main-content {
            padding: 8rem 1rem 5rem;
            max-width: 1300px;
            margin: 0 auto;
        }
        @media (max-width: 768px) { .main-content { padding-top: 4rem; } }

        .room-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2.5rem;
        }

        .room-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid #F1F5F9;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .room-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }
        .room-img-wrap {
            position: relative;
            height: 260px;
            overflow: hidden;
        }
        .room-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .room-card:hover .room-img-wrap img { transform: scale(1.1); }

        .room-badge-top {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            color: #0F172A;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .room-card-body { padding: 1.75rem 2rem 2rem; }
        .hotel-name {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        .room-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #0F172A;
            margin-bottom: 0.75rem;
        }
        .room-desc {
            font-size: 0.9rem;
            color: #64748B;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .room-meta { display: flex; gap: 1.25rem; margin-bottom: 1.75rem; }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #475569;
            font-weight: 500;
        }
        .meta-item i { color: var(--gold); font-size: 1.1rem; }

        .room-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.5rem;
            border-top: 1px solid #F1F5F9;
        }
        .price-tag .amount {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0F172A;
        }
        .price-tag .unit { font-size: 0.85rem; color: #94A3B8; margin-left: 4px; }
        
        .btn-premium {
            background: linear-gradient(135deg, #1A4A2E, #2D5A27);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 18px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-premium:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(26,74,46,0.3); }

        .section-intro {
            text-align: center;
            margin-bottom: 4rem;
        }
        .section-intro h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem; }
        .section-intro p { color: #64748B; font-size: 1.1rem; }
    </style>
</head>
<body>
    <nav id="navbar" class="scrolled"></nav>

    <div class="stays-hero">
        <p class="eyebrow">✦ The Art of Living ✦</p>
        <h1>Unveiling the Soul of Yercaud</h1>
        <p>A collection of verified luxury retreats and charming boutique escapes.</p>

        <div class="search-bar">
            <div class="search-field">
                <label>Guests</label>
                <select id="filterCapacity">
                    <option value="">All Guests</option>
                    <option value="2">Couples (2)</option>
                    <option value="4">Small Group (4+)</option>
                    <option value="6">Large Group (6+)</option>
                </select>
            </div>
            <div class="search-field">
                <label>Price Range</label>
                <select id="filterPrice">
                    <option value="">Any Price</option>
                    <option value="2000">Below ₹2,000</option>
                    <option value="5000">Below ₹5,000</option>
                    <option value="10000">Below ₹10,000</option>
                </select>
            </div>
            <button class="search-btn" onclick="loadRooms(true)">
                <i class="ph ph-magnifying-glass"></i> Explore Stays
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="section-intro">
            <h2>Curated Collections</h2>
            <p id="resultText">Discover the finest accommodations meticulously selected for your comfort.</p>
        </div>

        <div class="room-grid" id="roomGrid">
            <!-- Loading state -->
            <div class="skeleton-card" style="height:400px; background:#fff; border-radius:30px"></div>
            <div class="skeleton-card" style="height:400px; background:#fff; border-radius:30px"></div>
            <div class="skeleton-card" style="height:400px; background:#fff; border-radius:30px"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function starRating(n = 5) {
            return Array.from({length: 5}, (_, i) => `<i class="ph ph-star${i < n ? '-fill' : ''}" style="color:${i < n ? '#C9A84C' : '#CBD5E1'}"></i>`).join('');
        }

        async function loadRooms(shouldScroll = false) {
            const grid = document.getElementById('roomGrid');
            const capacity = document.getElementById('filterCapacity').value;
            const maxPrice = document.getElementById('filterPrice').value;
            let params = '?';
            if (capacity) params += `capacity=${capacity}&`;
            if (maxPrice) params += `maxPrice=${maxPrice}&`;

            try {
                const data = await apiFetch(`/rooms${params}`);
                const rooms = data.data;
                document.getElementById('resultText').textContent = `Found ${rooms.length} exclusive retreats matching your preferences.`;

                if (rooms.length === 0) {
                    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:5rem 0"><h3 class="text-muted">No retreats found matching your criteria.</h3></div>';
                    return;
                }

                grid.innerHTML = rooms.map(r => {
                    let img = 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=80&w=800';
                    try { img = (r.images && r.images.startsWith('[')) ? JSON.parse(r.images)[0] : (r.images || img); } catch(e){}

                    return `
                        <div class="room-card" onclick="window.location.href='room-details.html?id=${r.id}'">
                            <div class="room-img-wrap">
                                <img src="${img}" alt="${r.room_type}">
                                <span class="room-badge-top">${r.business_name}</span>
                            </div>
                            <div class="room-card-body">
                                <div class="hotel-name">${r.city || 'Yercaud'}</div>
                                <div class="room-title">${r.room_type}</div>
                                <div style="margin-bottom:1rem">${starRating(4)}</div>
                                <p class="room-desc">${r.description || 'Experience the perfect blend of modern luxury and hill station charm in our curated premium suite.'}</p>
                                <div class="room-meta">
                                    <div class="meta-item"><i class="ph ph-users"></i> ${r.capacity} Guests</div>
                                    <div class="meta-item"><i class="ph ph-wifi-high"></i> WiFi</div>
                                    <div class="meta-item"><i class="ph ph-sparkle"></i> Premium</div>
                                </div>
                                <div class="room-footer">
                                    <div class="price-tag">
                                        <span class="amount">₹${parseFloat(r.price_per_night).toLocaleString()}</span>
                                        <span class="unit">/ night</span>
                                    </div>
                                    <a href="room-details.html?id=${r.id}" class="btn-premium" onclick="event.stopPropagation()">
                                        Details <i class="ph ph-arrow-right"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                if (shouldScroll) {
                    document.querySelector('.section-intro').scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            } catch (e) { Toast.show(e.message, 'error'); }
        }

        loadRooms(false);
    </script>
</body>
</html>
